{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRUD Empleados y Cargos{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'gestion:home' %}">🏢 Gestión de Personal</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'gestion:cargo_lista_fbv' %}">Cargos (VBF)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'gestion:empleado_lista_fbv' %}">Empleados (VBF)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'gestion:cargo_lista_cbv' %}">Cargos (VBC)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'gestion:empleado_lista_cbv' %}">Empleados (VBC)</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
