{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>{{ titulo }}</h2>
    <a href="{% url url_crear %}" class="btn btn-primary">+ Nuevo cargo</a>
</div>

<div class="card shadow-sm">
    <table class="table table-hover mb-0">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th class="text-end">Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for cargo in cargos %}
            <tr>
                <td>{{ cargo.id }}</td>
                <td>{{ cargo.nombre }}</td>
                <td>{{ cargo.descripcion|default:"—" }}</td>
                <td class="text-end">
                    <a href="{% url url_editar cargo.pk %}" class="btn btn-sm btn-warning">Editar</a>
                    <a href="{% url url_eliminar cargo.pk %}" class="btn btn-sm btn-danger">Eliminar</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="4" class="text-center text-muted py-4">No hay cargos registrados.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
